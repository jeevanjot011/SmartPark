name: Deploy SmartPark to AWS Elastic Beanstalk

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install awsebcli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: 'ASIAWJSKDJT34PB4VS3I'
          aws-secret-access-key: 'irl1K13y7xHRq0ZNteoJVtif9X9TwK33lTzmo3nt'
          aws-session-token: ''
          aws-region: us-east-1

      - name: Generate EB config
        run: |
          mkdir -p .elasticbeanstalk
          cat > .elasticbeanstalk/config.yml << 'EOF'
          branch-defaults:
            main:
              environment: smartpark-env
              group_suffix: null
          global:
            application_name: smartpark
            branch: null
            default_ec2_keyname: null
            default_platform: Python 3.9
            default_region: us-east-1
            include_git_submodules: true
            instance_profile: null
            platform_name: null
            platform_version: null
            profile: null
            repository: null
            sc: git
            workspace_type: Application
          EOF

      - name: Deploy to Elastic Beanstalk
        run: |
          eb use smartpark-env || eb create smartpark-env --single
          eb deploy --staged

      - name: Deployment status
        run: |
          echo "✅ Deployed to: http://smartpark-env.elasticbeanstalk.com"